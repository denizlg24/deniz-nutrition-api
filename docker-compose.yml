services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-3000}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  redis-data:
